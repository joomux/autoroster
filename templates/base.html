<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}autoroster{% endblock %}</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% if session.user %}
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('upload') }}" class="logo">autoroster</a>
      <div class="header-user">
        <a href='https://ko-fi.com/A0A41LQYP0' target='_blank'><img height='36' style='border:0px;height:36px;' src='https://storage.ko-fi.com/cdn/kofi6.png?v=6' border='0' alt='Buy Me a Coffee at ko-fi.com' /></a>
        {% if session.user.picture %}
        <img class="avatar" src="{{ session.user.picture }}" alt="" />
        {% endif %}
        <span class="user-name">{{ session.user.name }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-ghost btn-sm">Sign out</a>
      </div>
    </div>
  </header>
  {% endif %}

  <main class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
